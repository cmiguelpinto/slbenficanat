<!DOCTYPE html>
<html lang="pt-PT">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Sport Lisboa e Benfica · Meeting Internacional Ciudad de Badajoz 26</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>:root {
      --navy: #5C0E14;
      --blue: #185FA5;
      --mid: #378ADD;
      --light: #A8CDEF;
      --pale: #E8F3FC;
      --white: #FFFFFF;
      --gold: #E8A020;
      --ink: #162536;
      --muted: #5A7188;
      --line: #DCE9F5;
      --page: #F4F7FA;
      --vel-bg: #FFF7E6;
      --vel-col: #B85C00;
      --vel-border: #E8A020;
      --mf-bg: #E8F3FC;
      --mf-col: #185FA5;

    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Barlow', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--page);
      color: var(--ink);
      line-height: 1.6;
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #32070B 0%, var(--navy) 52%, #7A151E 100%);
      color: white;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 90% at 92% 40%, rgba(196,38,60,.22) 0%, transparent 65%),
        radial-gradient(ellipse 40% 45% at 10% 20%, rgba(232,160,32,.14) 0%, transparent 60%),
        repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,.035) 79px, rgba(255,255,255,.035) 80px);
      pointer-events: none;
    }
    .hero-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 62px 28px 54px;
      position: relative;
    }
    .hero-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .hero-badge { display: none !important;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      padding: 6px 15px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: var(--light);
    }
    .hero-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 0 6px rgba(232,160,32,.14);
      animation: pulse 2.2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: .55; transform: scale(1.25); }
    }
    
    .hero-motto {
      display: inline-block;
      margin-bottom: 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(255,255,255,.78);
    }

    .hero h1 {
      max-width: 820px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(42px, 7vw, 84px);
      font-weight: 900;
      line-height: .92;
      text-transform: uppercase;
      letter-spacing: -.015em;
      margin-bottom: 16px;
    }
    .hero h1 .benfica-red { color: #E30613; }
    .hero h1 .meeting-white { color: #FFFFFF; }
    .hero-sub {
      max-width: 720px;
      color: #CBE2F7;
      font-size: 18px;
      font-weight: 300;
      margin-bottom: 34px;
    }
    .hero-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 12px;
      max-width: 900px;

      border: 1px solid rgba(255,255,255,.16);
      border-radius: 14px;

    .official-results-button {

      align-items: center;
      justify-content: center;
      background: #E30613;
      color: #FFFFFF;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;

      background: #B5121B;
      color: #FFFFFF;
    }
    .hero-actions {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav-link {

      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #E30613;
      text-decoration: none;

      border-bottom: 3px solid transparent;
      transition: .2s ease;
    }
    .nav-link:hover, .nav-link.active { color: #E30613; border-bottom-color: var(--gold); background: rgba(255,255,255,.92); }

    .content {
      max-width: 1180px;
      margin: 0 auto;
      padding: 42px 24px 80px;
    }
    section { scroll-margin-top: 68px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--pale);

    .section-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--blue);
      background: var(--pale);
      border: 1px solid var(--light);
      border-radius: 8px;

    .section-title-wrap {

    }
    .section-subtitle {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: #E30613;
      margin-top: 2px;
    }

    .section-title {

    .obj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
      gap: 13px;
      margin-bottom: 54px;
    }
    .obj-card {

      border: 1px solid var(--line);
      border-left: 5px solid var(--blue);

    .obj-icon { font-size: 19px; flex-shrink: 0; }

    .day-section { margin-bottom: 58px; }
    .day-label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--navy);
      color: white;

    .timeline {

      border: 1px solid var(--line);

      overflow: hidden;
      box-shadow: 0 4px 18px rgba(4,44,83,.05);
      margin-bottom: 30px;
    }
    .tl-item {
      display: grid;
      grid-template-columns: 130px 1fr;
      border-bottom: 1px solid #EEF4FA;
      transition: background .15s ease;
    }
    .tl-item:last-child { border-bottom: 0; }
    .tl-item:hover { background: #FAFCFF; }
    .tl-item.jump-target { cursor: pointer; }
    .tl-item.jump-target:hover .tl-title { text-decoration: underline; }
    .tl-item.focus-flash {
      outline: 3px solid var(--gold);
      outline-offset: -3px;
      animation: focusPulse 1.2s ease;
    }
    @keyframes focusPulse {
      0% { box-shadow: inset 0 0 0 0 rgba(232,160,32,.0); }
      35% { box-shadow: inset 0 0 0 999px rgba(232,160,32,.16); }
      100% { box-shadow: inset 0 0 0 0 rgba(232,160,32,.0); }
    }
    .tl-time {
      padding: 14px 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: var(--blue);
      border-right: 1px solid #EEF4FA;
      display: flex;
      align-items: center;
      background: #F7FAFD;
    }
    .tl-body { padding: 14px 18px; }
    .tl-title { font-weight: 700; font-size: 14px; color: var(--navy); margin-bottom: 2px; }
    .tl-detail { font-size: 13px; color: var(--muted); }
    .event-drop .tl-detail { text-align: center; }
    .event-drop summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .event-drop summary::-webkit-details-marker { display: none; }
    .event-drop .tl-title {
      flex: 1;
      text-align: left;
    }
    .event-drop summary::after {
      content: '⌄';
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: rgba(24,95,165,.10);
      color: var(--blue);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      transition: transform .18s ease;
      flex-shrink: 0;
    }
    .event-drop[open] summary::after { transform: rotate(180deg); }
    .event-table-wrap {
      margin-top: 12px;
      border: 1px solid #DCE9F5;
      border-radius: 10px;
      overflow: hidden;
      background: white;
    }
    .event-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .event-table th {
      background: #F7FAFD;
      color: var(--navy);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-align: center;
      padding: 9px 10px;
      border-bottom: 1px solid #DCE9F5;
    }
    .event-table td {
      padding: 10px;
      border-bottom: 1px solid #EEF4FA;
      color: #24384A;
      font-weight: 500;
      text-align: center;
    }
    .event-table tr:last-child td { border-bottom: 0; }
    .event-table td:nth-child(1), .event-table td:nth-child(2), .event-table td:nth-child(4) {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      color: var(--blue);
      white-space: nowrap;
    }
    .tl-item.highlight { background: #FFF8EC; }
    .tl-item.highlight .tl-time { background: #FFF0D6; color: #B85C00; }
    .tl-item.water { background: #EEF6FF; }
    .tl-item.water .tl-time { background: #DFF0FF; color: #0A4A8A; }
    .tl-item.gym { background: #F2F5FF; }
    .tl-item.spa { background: #F0FBF5; }
    .tl-item.spa .tl-time { background: #DCF5E8; color: #1A6B3C; }
    .tl-item.talk { background: #FFF5F0; }
    .tl-item.talk .tl-time { background: #FFE8DC; color: #9A3400; }

    .session-block { margin-bottom: 36px; }
    .session-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;

    .session-header h3 {

    }
    .session-meta { font-size: 13px; color: var(--light); }
    .session-meta strong { color: var(--gold); font-weight: 800; }
    .grupos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid var(--line);
      border-top: 0;
      border-radius: 0 0 14px 14px;

    }
    .grupo-col { border-right: 1px solid var(--line); background: white; }
    .grupo-col:last-child { border-right: 0; }
    .grupo-head {

    .vel .grupo-head, .vel-col .atleta-col-head { background: var(--vel-bg); color: var(--vel-col); border-bottom: 2px solid var(--vel-border); }
    .mf .grupo-head, .mf-col .atleta-col-head { background: var(--mf-bg); color: var(--mf-col); border-bottom: 2px solid var(--mf-border); }
    .fun .grupo-head, .fun-col .atleta-col-head { background: var(--fun-bg); color: var(--fun-col); border-bottom: 2px solid var(--fun-border); }
    .grupo-dist { font-size: 13px; font-weight: 900; }
    .grupo-body { padding: 13px 16px 16px; }
    .grupo-coaches {

    .mf .grupo-coaches { color: var(--mf-col); }
    .fun .grupo-coaches { color: var(--fun-col); }
    .serie-block { margin-bottom: 13px; }

    .serie-label {
      display: block;

    }
    .serie-items { list-style: none; }

      display: grid;
      grid-template-columns: repeat(3, 1fr);

    .atleta-buttons {

    .atleta-button {

      padding: 15px 18px;

    .quiz-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(4,44,83,.05);
      overflow: hidden;
    }
    .quiz-intro {
      padding: 16px 18px;

    function block(label, items) { return { label, items }; }
    function group(type, name, dist, coaches, blocks) { return { type, name, dist, coaches, blocks }; }
    function groupAthletes(type, name, coaches, athletes) { return { type, name, coaches, athletes }; }
    function simpleSession(title, meta, distances) {
      const common = [
        block('Aquecimento', ['400 Livres · 300 Bra · 200 Per', '4×50 TT 25 drill + 25 NC']),
        block('Técnica Específica', ['4×50 técnica', '4×50 subaquáticos', '4×50 viragens', '4×50 rendições']),

      ];
      return { title, meta, groups: [
        group('vel', ' Velocidade', distances[0], 'Rui Costa + JP Frois + Rui Borges', common),
        group('mf', ' Meio Fundo', distances[1], 'Diogo Pinto', common),
        group('fun', ' Fundo', distances[2], 'Pedro Silva + Diogo Girão', common)
      ] };

    function renderHero() {
      document.getElementById('heroTitle').innerHTML = page.title;
      document.getElementById('heroSubtitle').innerHTML = page.subtitle;
      document.getElementById('heroMeta').innerHTML = page.meta.map(([icon, text]) => `<div class="hero-chip">${icon} <span>${text}</span></div>`).join('');
    }

    function renderNav() {
      const links = [
        ['objetivos', 'Material'],
        ...page.days.map((d, i) => [d.id, d.navLabel || `Dia ${i + 1}`]),
        ['atletas', 'Convocados'],
        ['quiz', 'Quiz']
      ];
      document.getElementById('navLinks').innerHTML = links.map(([id, label]) => `<a class="nav-link" href="#${id}">${label}</a>`).join('');
    }

    function renderSectionHeader(num, title) {
      return `<div class="section-header"><span class="section-num">${num}</span><h2 class="section-title">${title}</h2></div>`;
    }

    function renderTimeline(day) {
      return `<div><div class="day-label"><span class="day-num">${day.label}</span> ${day.labelText}</div><div class="timeline">${day.timeline.map(([time, title, detail, type, entries, linkTarget, rowId]) => {
        const hasEntries = Array.isArray(entries) && entries.length;
        const body = hasEntries
          ? `<details class="event-drop"><summary><span class="tl-title">${title}</span></summary>${detail ? `<div class="tl-detail">${detail}</div>` : ''}<div class="event-table-wrap"><table class="event-table"><thead><tr><th>Série</th><th>Pista</th><th>Atleta</th><th>Tempo</th></tr></thead><tbody>${entries.map(e => `<tr><td>${e[0]}</td><td>${e[1]}</td><td>${e[2]}</td><td>${e[3]}</td></tr>`).join('')}</tbody></table></div></details>`
          : `<div class="tl-title">${title}</div>${detail ? `<div class="tl-detail">${detail}</div>` : ''}`;
        return `<div ${rowId ? `id="${rowId}"` : ''} class="tl-item ${type} ${hasEntries ? 'has-details' : ''} ${linkTarget ? 'jump-target' : ''}" ${linkTarget ? `data-jump="${linkTarget}"` : ''}><div class="tl-time">${time}</div><div class="tl-body">${body}</div></div>`;
      }).join('')}</div></div>`;
    }

    function renderSession(session) {
      return `<div class="session-block"><div class="session-header"><h3>${session.title}</h3><span class="session-meta">${session.meta}</span></div><div class="grupos-grid">${session.groups.map(renderGroup).join('')}</div></div>`;
    }

    function renderGroup(g) {
      return `<div class="grupo-col ${g.type}"><div class="grupo-head">${g.name} <span class="grupo-dist">${g.dist}</span></div><div class="grupo-body"><div class="grupo-coaches">${g.coaches}</div>${g.blocks.map(b => `
        <div class="serie-block"><span class="serie-label">${b.label}</span><ul class="serie-items">${b.items.map(i => `<li>${i}</li>`).join('')}</ul></div>`).join('')}</div></div>`;
    }

    function renderAthletes() {
      return `<section id="atletas">${renderSectionHeader('06', '<span class="section-title-wrap"><span>Convocados</span><span class="section-subtitle">Diogo Pinto &amp; Carlos Pinto</span></span>')}<div class="atletas-section"><div class="atletas-grid convocados-grid">${page.athletes.map(g => `
        <div class="atleta-col ${g.type}"><div class="atleta-col-head">${g.name}</div><div class="atleta-list">${g.athletes.map((name, idx) => {
          const parts = name.split(',');
          const buttons = {
            'GODINHO, António Carimbo': [
              `<a href="#j1-200-mariposa-masc" class="atleta-button" data-open-event="j1-200-mariposa-masc">200 M</a>`,
              `<a href="#j1-50-mariposa-masc" class="atleta-button" data-open-event="j1-50-mariposa-masc">50 M</a>`
            ],
            'MIMOSO, Renato Ferreira': [
              `<a href="#j1-100-livres-masc" class="atleta-button" data-open-event="j1-100-livres-masc">100 L</a>`,
              `<a href="#j2-100-mariposa-masc" class="atleta-button" data-open-event="j2-100-mariposa-masc">100 M</a>`
            ]
          }[name] || [];
          const extraButtons = buttons.length ? `<span class="atleta-buttons">${buttons.join('')}</span>` : '';
          const number = String(idx + 1).padStart(2, '0');
          return `<div class="atleta-item"><span class="atleta-num">${number}</span><span class="atleta-name">${parts[0]}, <em>${(parts[1] || '').trim()}</em></span>${extraButtons}</div>`;
        }).join('')}</div></div>`).join('')}</div></div><div class="convocados-note"><span></span><span><strong>Nota:</strong> Todos os horários são locais</span></div></section>`;
    }


    function renderQuiz() {
      return `<section id="quiz">${renderSectionHeader('07', 'Quiz')}<div class="quiz-card"><div class="quiz-intro">Responde ao quiz e envia as respostas por email. Podes ter até <strong>20 perguntas</strong>; neste momento estão configuradas ${page.quiz.length}.</div><form class="quiz-form" id="quizForm" action="https://formspree.io/f/mykoryep" method="POST"><input type="hidden" name="_subject" value="Quiz Badajoz 26 - Sport Lisboa e Benfica"><input type="hidden" name="resumo" id="quizSummary"><input type="hidden" name="pontuacao" id="quizScore"><div class="quiz-row"><label for="quizName">Nome do atleta</label><input id="quizName" name="nome" type="text" placeholder="Nome completo" required></div>${page.quiz.map((item, index) => `
            <div class="quiz-question"><div class="quiz-question-title">${String(index + 1).padStart(2, '0')}. ${item.q}</div><div class="quiz-options">${item.options.map(option => `
                  <label class="quiz-option"><input type="radio" name="q${index}" value="${option}" required><span>${option}</span></label>`).join('')}</div></div>`).join('')}

    }


    function renderApp() {
      const objetivos = `<section id="objetivos">${renderSectionHeader('01', 'Material')}<div class="obj-grid">${page.material.map(([icon, text]) => `<div class="obj-card"><span class="obj-icon">${icon}</span>${text}</div>`).join('')}</div></section>`;
      const days = page.days.map(day => `<section id="${day.id}" class="day-section">${renderSectionHeader(day.num, day.title)}${renderTimeline(day)}${day.sessions.map(renderSession).join('')}</section>`).join('');
      document.getElementById('app').innerHTML = objetivos + days + renderAthletes() + renderQuiz();
    }

    function setupActiveNav() {
      const sections = document.querySelectorAll('section[id]');
      const navLinks = document.querySelectorAll('.nav-link');
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            navLinks.forEach(link => link.classList.remove('active'));
            const active = document.querySelector(`.nav-link[href="#${entry.target.id}"]`);
            if (active) active.classList.add('active');
          }
        });
      }, { rootMargin: '-30% 0px -60% 0px' });
      sections.forEach(section => observer.observe(section));
    }

    renderHero();
    renderNav();
    renderApp();
    document.addEventListener('click', event => {
      const eventButton = event.target.closest('[data-open-event]');
      if (eventButton) {
        event.preventDefault();
        const target = document.getElementById(eventButton.dataset.openEvent);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          const details = target.querySelector('details.event-drop');
          if (details) {
            details.open = true;
          }
          target.classList.add('focus-flash');
          setTimeout(() => target.classList.remove('focus-flash'), 1200);
        }
        return;
      }

      const jumpItem = event.target.closest('[data-jump]');
      if (!jumpItem) return;
      const target = document.getElementById(jumpItem.dataset.jump);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    document.addEventListener('submit', async event => {
      if (event.target.id !== 'quizForm') return;
      event.preventDefault();

      const form = event.target;
      const button = form.querySelector('.quiz-submit');
      const feedback = form.querySelector('#quizFeedback');
      const athleteName = form.querySelector('#quizName').value.trim();
      let score = 0;

      const lines = [
        'QUIZ - SPORT LISBOA E BENFICA',
        'Meeting Internacional Ciudad de Badajoz 26',
        '',
        `Atleta: ${athleteName}`,
        `Data de envio: ${new Date().toLocaleString('pt-PT')}`,
        '',
        'RESPOSTAS:'
      ];

      page.quiz.forEach((item, index) => {
        const selected = form.querySelector(`input[name="q${index}"]:checked`);
        const answer = selected ? selected.value : 'Sem resposta';
        const correct = answer === item.answer;
        if (correct) score += 1;

        lines.push('');
        lines.push(`${index + 1}. ${item.q}`);
        lines.push(`Resposta: ${answer}`);
        lines.push(`Resultado: ${correct ? 'Certo' : 'Errado'}`);
        lines.push(`Resposta correta: ${item.answer}`);

        let hidden = form.querySelector(`input[name="pergunta_${index + 1}"]`);
        if (!hidden) {
          hidden = document.createElement('input');
          hidden.type = 'hidden';
          hidden.name = `pergunta_${index + 1}`;
          form.appendChild(hidden);
        }
        hidden.value = `${item.q} | Resposta: ${answer} | ${correct ? 'Certo' : 'Errado'} | Correta: ${item.answer}`;
      });

      lines.push('');
      lines.push(`Pontuação: ${score}/${page.quiz.length}`);

      form.querySelector('#quizSummary').value = lines.join('\n');
      form.querySelector('#quizScore').value = `${score}/${page.quiz.length}`;
      form.querySelector('input[name="_subject"]').value = `Quiz Badajoz 26 - ${athleteName || 'Atleta'}`;

      feedback.className = 'quiz-feedback';
      feedback.textContent = '';
      button.disabled = true;
      button.textContent = 'A enviar...';

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          feedback.className = 'quiz-feedback success';
          feedback.textContent = 'Respostas enviadas com sucesso.';
          form.reset();
        } else {
          feedback.className = 'quiz-feedback error';
          feedback.textContent = 'Não foi possível enviar. Confirma se o Formspree está ativo/verificado.';
        }
      } catch (error) {
        feedback.className = 'quiz-feedback error';
        feedback.textContent = 'Erro de ligação. Tenta novamente.';
      } finally {
        button.disabled = false;
        button.textContent = 'Enviar respostas por email';
      }
    });

    setupActiveNav();</script>
